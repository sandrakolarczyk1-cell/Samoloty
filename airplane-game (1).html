<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKY STRIKER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Orbitron',sans-serif;color:#00ffcc;overflow:hidden;}

/* Single app container */
#app{width:620px;display:flex;flex-direction:column;}

/* Top bar always visible */
#topbar{display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px;background:rgba(0,255,204,0.04);
  border:1px solid rgba(0,255,204,0.2);border-bottom:none;font-size:10px;letter-spacing:2px;}
#topbar span{color:#fff;margin-left:3px;font-family:'Share Tech Mono',monospace;}
.tg{color:#ffd700;}.tg span{color:#ffd700;}
.tl{color:#ff4466;}
.th{color:#ff9900;}

/* Canvas */
#gameCanvas{display:block;border:1px solid rgba(0,255,204,0.3);}

/* All screens sit on top of canvas using the same space */
#screens{position:relative;width:620px;height:0;}/* height:0 so canvas shows through */

.screen{
  position:absolute;bottom:0;left:0;width:620px;height:500px;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.screen.active{display:flex;}

/* Login + Menu + GameOver screens have background */
#sLogin,#sMenu,#sGameOver{background:rgba(0,0,8,0.95);}
/* Shop is scrollable */
#sShop{background:rgba(0,0,8,0.98);justify-content:flex-start;padding:14px 14px 10px;gap:7px;overflow-y:auto;}

/* Typography */
.big-title{font-size:40px;font-weight:900;letter-spacing:8px;color:#fff;
  text-shadow:0 0 18px #00ffcc,0 0 50px #00ffcc33;animation:pulse 2s ease-in-out infinite;}
.mid-title{font-size:26px;font-weight:900;letter-spacing:6px;color:#fff;}
.sub{font-size:10px;letter-spacing:4px;color:#00ffcc77;}
.gold{color:#ffd700;}
.orange{color:#ff9900;}
@keyframes pulse{0%,100%{text-shadow:0 0 18px #00ffcc,0 0 50px #00ffcc33;}50%{text-shadow:0 0 35px #00ffcc,0 0 80px #00ffcc77;}}

/* Buttons */
.btn{padding:11px 36px;background:transparent;border:2px solid #00ffcc;color:#00ffcc;
  font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer;
  transition:all .18s;text-transform:uppercase;}
.btn:hover,.btn:active{background:#00ffcc;color:#000;}
.btn-gold{border-color:#ffd700;color:#ffd700;}
.btn-gold:hover,.btn-gold:active{background:#ffd700;color:#000;}
.btn-orange{border-color:#ff9900;color:#ff9900;font-size:9px;}
.btn-orange:hover,.btn-orange:active{background:#ff9900;color:#000;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* Login */
.login-input{width:240px;padding:10px 14px;background:rgba(0,255,204,0.05);
  border:1px solid rgba(0,255,204,0.3);color:#fff;font-family:'Share Tech Mono',monospace;
  font-size:14px;letter-spacing:3px;outline:none;text-align:center;text-transform:uppercase;}
.login-input:focus{border-color:#00ffcc;}
.err{font-size:9px;color:#ff4466;min-height:12px;letter-spacing:2px;font-family:'Share Tech Mono',monospace;}

/* Scoreboard */
.sb{width:280px;}
.sb-title{font-size:9px;letter-spacing:3px;color:#ff9900;text-align:center;margin-bottom:6px;}
.sb-row{display:flex;gap:8px;padding:3px 8px;font-family:'Share Tech Mono',monospace;font-size:9px;}
.sb-row:nth-child(odd){background:rgba(255,153,0,0.04);}
.sb-pos{color:#444;width:20px;}
.sb-name{color:#aaa;flex:1;}
.sb-score{color:#ff9900;}
.sb-me .sb-name{color:#00ffcc;}
.sb-me .sb-score{color:#00ffcc;}

/* Shop */
.shop-title{font-size:18px;font-weight:900;letter-spacing:5px;color:#ffd700;}
.shop-coins{font-family:'Share Tech Mono',monospace;font-size:11px;color:#ffd700;letter-spacing:2px;}
.shop-msg{font-size:8px;letter-spacing:2px;min-height:11px;font-family:'Share Tech Mono',monospace;}
.tabs{display:flex;width:100%;}
.tab{flex:1;padding:6px 2px;background:rgba(255,215,0,0.02);border:1px solid rgba(255,215,0,0.1);
  color:#555;font-family:'Orbitron',sans-serif;font-size:8px;cursor:pointer;text-align:center;transition:all .15s;}
.tab:hover{color:#ffd700;}
.tab.on{background:rgba(255,215,0,0.08);border-color:#ffd700;color:#ffd700;}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;width:100%;}
.pcard{border:1px solid rgba(255,215,0,0.1);background:rgba(255,215,0,0.01);
  padding:7px 4px 5px;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;position:relative;transition:all .15s;}
.pcard:hover{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.04);}
.pcard.owned{border-color:rgba(0,255,204,0.35);}
.pcard.act{border-color:#00ffcc;background:rgba(0,255,204,0.07);}
.pcard canvas{display:block;}
.pname{font-size:7px;letter-spacing:1px;color:#ddd;text-align:center;}
.pinfo{font-size:6px;font-family:'Share Tech Mono',monospace;color:#555;text-align:center;}
.pprice{font-size:9px;color:#ffd700;}
.pbadge{position:absolute;top:3px;right:3px;font-size:6px;padding:1px 3px;border:1px solid;}
.bown{color:#00ffcc;border-color:#00ffcc;}
.bact{color:#fff;background:#00ffcc22;border-color:#00ffcc;}
.block{color:#333;border-color:#222;}
.upgrades{width:100%;display:flex;flex-direction:column;gap:4px;}
.up-title{font-size:9px;letter-spacing:3px;color:#fff;text-align:center;}
.uprow{display:flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid rgba(255,215,0,0.1);}
.uprow-name{font-size:7px;color:#888;width:68px;flex-shrink:0;}
.upbars{display:flex;gap:2px;flex:1;}
.upbar{height:7px;flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);}
.upbar.on{background:#ffd700;border-color:#ffd700;}
.upbar.max{background:#00ffcc;border-color:#00ffcc;}
.upbtn{padding:3px 7px;background:transparent;border:1px solid #ffd700;color:#ffd700;
  font-family:'Orbitron',sans-serif;font-size:6px;cursor:pointer;white-space:nowrap;transition:all .1s;}
.upbtn:hover{background:#ffd700;color:#000;}
.upbtn:disabled{border-color:#333;color:#333;cursor:default;}
.upbtn:disabled:hover{background:transparent;color:#333;}
.scbtn{padding:7px 24px;border:2px solid rgba(255,215,0,0.3);color:#ffd700;background:transparent;
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.scbtn:hover{background:#ffd700;color:#000;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div>WYNIK:<span id="tsc">0</span></div>
    <div>LVL:<span id="tlv">1</span></div>
    <div class="tg">💰<span id="tco">0</span></div>
    <div class="tl">❤<span id="tli">5</span></div>
    <div class="th">🏆<span id="ths">0</span></div>
    <div style="color:#00ffcc88;font-size:9px">👤<span id="tun" style="color:#00ffcc">-</span></div>
  </div>

  <canvas id="gameCanvas" width="620" height="500"></canvas>

  <div id="screens">

    <!-- LOGIN -->
    <div class="screen active" id="sLogin">
      <div class="big-title" style="font-size:34px">SKY STRIKER</div>
      <div class="sub">WPISZ PSEUDONIM ABY ZAPISAĆ WYNIKI</div>
      <input class="login-input" id="nickIn" placeholder="PSEUDONIM" maxlength="16" autocomplete="off"/>
      <div class="err" id="nickErr"></div>
      <button class="btn" id="btnLogin">▶ WEJDŹ</button>
      <div class="sb" id="sbEl"></div>
    </div>

    <!-- MENU -->
    <div class="screen" id="sMenu">
      <div class="big-title">SKY STRIKER</div>
      <div class="sub" id="menuSub">STRZELANKA LOTNICZA</div>
      <div class="sub" id="menuPlane"></div>
      <div class="btn-row">
        <button class="btn" id="btnStart">▶ START</button>
        <button class="btn btn-gold" id="btnShop">🛒 HANGAR</button>
      </div>
      <div class="sub" style="font-size:8px">RUCH MYSZĄ | AUTO-STRZAŁ | 10PKT = 1💰</div>
    </div>

    <!-- GAME OVER -->
    <div class="screen" id="sGameOver">
      <div class="mid-title">GAME OVER</div>
      <div style="font-size:18px;letter-spacing:3px;color:#fff">WYNIK: <span id="goScore">0</span></div>
      <div id="goNew" style="font-size:13px;letter-spacing:3px;color:#ff9900;display:none">🏆 NOWY REKORD!</div>
      <div style="font-size:11px;letter-spacing:2px;color:#ff9900">REKORD: <span id="goHS">0</span></div>
      <div style="font-size:12px;letter-spacing:2px;color:#ffd700">+<span id="goEarned">0</span> 💰 ZŁOTO</div>
      <div style="font-size:10px;color:#00ffcc77">ŁĄCZNIE: <span id="goTotal">0</span> 💰</div>
      <div class="btn-row">
        <button class="btn" id="btnRestart">▶ PONOWNIE</button>
        <button class="btn btn-gold" id="btnGoShop">🛒 HANGAR</button>
        <button class="btn btn-orange" id="btnTable">🏆 TABELA</button>
      </div>
    </div>

    <!-- SHOP -->
    <div class="screen" id="sShop">
      <div class="shop-title">✦ HANGAR ✦</div>
      <div class="shop-coins">ZŁOTO: <span id="shopCoins">0</span> 💰</div>
      <div class="shop-msg" id="shopMsg"></div>
      <div class="tabs" id="shopTabs"></div>
      <div class="pgrid" id="shopGrid"></div>
      <div class="upgrades" id="shopUps" style="display:none"></div>
      <button class="scbtn" id="btnShopBack">← POWRÓT</button>
    </div>

  </div>
</div>

<script>
'use strict';

// ── DRAW FUNCTIONS ────────────────────────────────────────────────────
const D={
  falcon(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(6,0);ctx.lineTo(4,14);ctx.lineTo(-4,14);ctx.lineTo(-6,0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-6,4);ctx.lineTo(-22,14);ctx.lineTo(-16,14);ctx.lineTo(-4,8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(6,4);ctx.lineTo(22,14);ctx.lineTo(16,14);ctx.lineTo(4,8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-4,10);ctx.lineTo(-10,18);ctx.lineTo(-4,15);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(4,10);ctx.lineTo(10,18);ctx.lineTo(4,15);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;ctx.beginPath();ctx.ellipse(0,15,4,7,0,0,Math.PI*2);ctx.fill();
  },
  arrow(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(4,-2);ctx.lineTo(5,14);ctx.lineTo(-5,14);ctx.lineTo(-4,-2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-4,2);ctx.lineTo(-18,8);ctx.lineTo(-14,14);ctx.lineTo(-4,10);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(4,2);ctx.lineTo(18,8);ctx.lineTo(14,14);ctx.lineTo(4,10);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;ctx.beginPath();ctx.ellipse(0,16,3,6,0,0,Math.PI*2);ctx.fill();
  },
  viper(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(4,0);ctx.lineTo(3,14);ctx.lineTo(-3,14);ctx.lineTo(-4,0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(-26,8);ctx.lineTo(-20,12);ctx.lineTo(-3,4);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(4,0);ctx.lineTo(26,8);ctx.lineTo(20,12);ctx.lineTo(3,4);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-3,8);ctx.lineTo(-8,18);ctx.lineTo(-3,15);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(3,8);ctx.lineTo(8,18);ctx.lineTo(3,15);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-4,16,3,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(4,16,3,5,0,0,Math.PI*2);ctx.fill();
  },
  shield(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(9,2);ctx.lineTo(8,16);ctx.lineTo(-8,16);ctx.lineTo(-9,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-9,2);ctx.lineTo(-30,10);ctx.lineTo(-26,16);ctx.lineTo(-8,8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(9,2);ctx.lineTo(30,10);ctx.lineTo(26,16);ctx.lineTo(8,8);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;ctx.beginPath();ctx.ellipse(0,18,5,7,0,0,Math.PI*2);ctx.fill();
  },
  thunder(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(8,2);ctx.lineTo(6,14);ctx.lineTo(-6,14);ctx.lineTo(-8,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-8,2);ctx.lineTo(-28,10);ctx.lineTo(-22,16);ctx.lineTo(-6,6);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(8,2);ctx.lineTo(28,10);ctx.lineTo(22,16);ctx.lineTo(6,6);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;ctx.beginPath();ctx.ellipse(0,17,5,8,0,0,Math.PI*2);ctx.fill();
  },
  twin(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(-5,-18);ctx.lineTo(-2,2);ctx.lineTo(-2,14);ctx.lineTo(-8,14);ctx.lineTo(-9,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(5,-18);ctx.lineTo(2,2);ctx.lineTo(2,14);ctx.lineTo(8,14);ctx.lineTo(9,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-9,4);ctx.lineTo(-28,12);ctx.lineTo(-22,16);ctx.lineTo(-8,8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(9,4);ctx.lineTo(28,12);ctx.lineTo(22,16);ctx.lineTo(8,8);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-5,16,3,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5,16,3,6,0,0,Math.PI*2);ctx.fill();
  },
  phantom(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(20,14);ctx.lineTo(10,18);ctx.lineTo(0,10);ctx.lineTo(-10,18);ctx.lineTo(-20,14);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-4,14);ctx.lineTo(-8,22);ctx.lineTo(-4,19);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(4,14);ctx.lineTo(8,22);ctx.lineTo(4,19);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-5,18,3,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5,18,3,5,0,0,Math.PI*2);ctx.fill();
  },
  cobra(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(6,2);ctx.lineTo(8,16);ctx.lineTo(-8,16);ctx.lineTo(-6,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-6,2);ctx.lineTo(-30,16);ctx.lineTo(-20,18);ctx.lineTo(-6,10);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(6,2);ctx.lineTo(30,16);ctx.lineTo(20,18);ctx.lineTo(6,10);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-5,18,4,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5,18,4,6,0,0,Math.PI*2);ctx.fill();
  },
  osprey(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(5,0);ctx.lineTo(4,18);ctx.lineTo(-4,18);ctx.lineTo(-5,0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-32,6);ctx.lineTo(-32,14);ctx.lineTo(-5,10);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(5,0);ctx.lineTo(32,6);ctx.lineTo(32,14);ctx.lineTo(5,10);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.ellipse(-32,10,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(32,10,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-30,10,3,3,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(30,10,3,3,0,0,Math.PI*2);ctx.fill();
  },
  nova(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(7,-4);ctx.lineTo(10,14);ctx.lineTo(-10,14);ctx.lineTo(-7,-4);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(-30,12);ctx.lineTo(-24,18);ctx.lineTo(-8,6);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(7,0);ctx.lineTo(30,12);ctx.lineTo(24,18);ctx.lineTo(8,6);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-6,-8);ctx.lineTo(-16,-4);ctx.lineTo(-14,0);ctx.lineTo(-6,-4);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(6,-8);ctx.lineTo(16,-4);ctx.lineTo(14,0);ctx.lineTo(6,-4);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-6,17,4,7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(6,17,4,7,0,0,Math.PI*2);ctx.fill();
  },
  storm(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(5,-2);ctx.lineTo(6,14);ctx.lineTo(-6,14);ctx.lineTo(-5,-2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-5,-2);ctx.lineTo(-26,8);ctx.lineTo(-20,14);ctx.lineTo(-5,6);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(5,-2);ctx.lineTo(26,8);ctx.lineTo(20,14);ctx.lineTo(5,6);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.ellipse(-22,10,3,7,0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(22,10,3,7,-0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-4,16,3,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(4,16,3,6,0,0,Math.PI*2);ctx.fill();
  },
  raptor(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-24);ctx.lineTo(3,-6);ctx.lineTo(16,4);ctx.lineTo(10,16);ctx.lineTo(0,12);ctx.lineTo(-10,16);ctx.lineTo(-16,4);ctx.lineTo(-3,-6);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-3,-6);ctx.lineTo(-20,-2);ctx.lineTo(-16,4);ctx.lineTo(-3,0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(3,-6);ctx.lineTo(20,-2);ctx.lineTo(16,4);ctx.lineTo(3,0);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-5,14,3,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5,14,3,6,0,0,Math.PI*2);ctx.fill();
  },
  spectre(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(28,12);ctx.lineTo(22,18);ctx.lineTo(12,10);ctx.lineTo(0,14);ctx.lineTo(-12,10);ctx.lineTo(-22,18);ctx.lineTo(-28,12);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-8,14,3,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(8,14,3,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,13,3,5,0,0,Math.PI*2);ctx.fill();
  },
  hydra(ctx,c,ec){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(6,0);ctx.lineTo(8,16);ctx.lineTo(-8,16);ctx.lineTo(-6,0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(-28,10);ctx.lineTo(-24,18);ctx.lineTo(-6,8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(6,0);ctx.lineTo(28,10);ctx.lineTo(24,18);ctx.lineTo(6,8);ctx.closePath();ctx.fill();
    ctx.fillStyle=ec;
    ctx.beginPath();ctx.ellipse(-6,18,3,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(6,18,3,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,19,3,6,0,0,Math.PI*2);ctx.fill();
  },
  wraith(ctx,c,ec){

function applyUps(base,u){
  return{
    bw:  base.bw  +u.fire *0.8,
    bs:  base.bs  +u.speed*0.6,
    sr:  Math.max(5,base.sr-u.speed*1.2),
    lives:base.lives+u.armor,
    shots:Math.min(6,base.shots+Math.floor(u.salvo/2))
  };
}

const KEY='ss6';
function loadAll(){try{return JSON.parse(localStorage.getItem(KEY)||'{}');}catch(e){return {};}}
function saveAll(){try{localStorage.setItem(KEY,JSON.stringify(ALL));}catch(e){}}
let ALL=loadAll();
let USER=null,G=null;

function userLoad(nick){
  if(!ALL[nick])ALL[nick]={coins:0,owned:['falcon'],active:'falcon',ups:{},hs:0};
  return ALL[nick];
}
function userSave(){if(USER&&G){ALL[USER]=G;saveAll();}}
function getUps(id){return(G.ups&&G.ups[id])||{fire:0,speed:0,armor:0,salvo:0};}
function getStats(id){return applyUps(PLANES.find(p=>p.id===id)||PLANES[0],getUps(id));}
function activePlane(){return PLANES.find(p=>p.id===G.active)||PLANES[0];}

function renderSB(){
  const rows=Object.entries(ALL)
    .map(([n,d])=>({n,s:d.hs||0}))
    .sort((a,b)=>b.s-a.s).slice(0,8);
  if(!rows.length){document.getElementById('sbEl').innerHTML='';return;}
  let h='<div class="sb-title">🏆 NAJLEPSZE WYNIKI</div>';
  rows.forEach((r,i)=>h+=`<div class="sb-row${USER&&r.n===USER?' sb-me':''}"><span class="sb-pos">#${i+1}</span><span class="sb-name">${r.n}</span><span class="sb-score">${r.s.toLocaleString()}</span></div>`);
  document.getElementById('sbEl').innerHTML=h;
}

function doLogin(){
  let nick=document.getElementById('nickIn').value.trim().toUpperCase().replace(/[^A-Z0-9_]/g,'').slice(0,16);
  if(!nick){document.getElementById('nickErr').textContent='Podaj pseudonim!';return;}
  USER=nick;G=userLoad(nick);
  document.getElementById('nickErr').textContent='';
  updBar();
  renderMenu();
  show('menu');
}

let shopTier=1;
function renderShop(){
  document.getElementById('shopCoins').textContent=(G.coins||0).toLocaleString();
  document.getElementById('shopMsg').textContent='';
  // tabs
  const tabs=document.getElementById('shopTabs');tabs.innerHTML='';
  [1,2,3,4].forEach(t=>{
    const tb=document.createElement('div');tb.className='tab'+(shopTier===t?' on':'');
    tb.textContent=['','⚙ T1','⚡ T2','🔥 T3','💎 T4'][t];
    tb.style.color=shopTier===t?TIER_C[t]:'#555';
    tb.style.borderColor=shopTier===t?TIER_C[t]:'rgba(255,215,0,0.08)';
    tb.addEventListener('click',()=>{shopTier=t;renderShop();});
    tabs.appendChild(tb);
  });
  // grid
  const grid=document.getElementById('shopGrid');grid.innerHTML='';
  PLANES.filter(p=>p.tier===shopTier).forEach(p=>{
    const owned=G.owned.includes(p.id),isAct=G.active===p.id;
    const card=document.createElement('div');
    card.className='pcard'+(isAct?' act':owned?' owned':'');
    // preview canvas
    const cv=document.createElement('canvas');cv.width=68;cv.height=60;
    const cx=cv.getContext('2d');cx.fillStyle='#00000d';cx.fillRect(0,0,68,60);
    if(D[p.id]){cx.save();cx.translate(34,28);cx.scale(0.78,0.78);D[p.id](cx,p.col,p.ec);cx.restore();}
    card.appendChild(cv);
    const nm=document.createElement('div');nm.className='pname';nm.textContent=p.name;card.appendChild(nm);
    const inf=document.createElement('div');inf.className='pinfo';inf.textContent='❤'+p.lives+'  🔫'+p.shots;card.appendChild(inf);
    if(!owned){const pr=document.createElement('div');pr.className='pprice';pr.style.color=TIER_C[p.tier];pr.textContent=p.price.toLocaleString()+'💰';card.appendChild(pr);}
    const badge=document.createElement('div');badge.className='pbadge';
    if(isAct){badge.textContent='▶';badge.className='pbadge bact';}
    else if(owned){badge.textContent='✓';badge.className='pbadge bown';}
    else{badge.textContent='🔒';badge.className='pbadge block';}
    card.appendChild(badge);
    card.addEventListener('click',()=>{
      const msg=document.getElementById('shopMsg');
      if(isAct){renderUps(p.id);return;}
      if(owned){G.active=p.id;userSave();updBar();renderMenu();renderShop();renderUps(p.id);msg.style.color='#00ffcc';msg.textContent='✓ '+p.name+' AKTYWNY';return;}
      if(G.coins>=p.price){G.coins-=p.price;G.owned.push(p.id);G.active=p.id;userSave();updBar();renderMenu();renderShop();renderUps(p.id);msg.style.color='#ffd700';msg.textContent='✓ KUPIONO '+p.name;}
      else{msg.style.color='#ff4466';msg.textContent='BRAKUJE '+(p.price-G.coins).toLocaleString()+' 💰';document.getElementById('shopUps').style.display='none';}
    });
    grid.appendChild(card);
  });
  // auto-show upgrades for active plane if in same tier
  const act=activePlane();
  if(act.tier===shopTier)renderUps(G.active);
  else document.getElementById('shopUps').style.display='none';
}

function renderUps(id){
  const p=PLANES.find(x=>x.id===id);if(!p)return;
  const el=document.getElementById('shopUps');el.style.display='flex';el.innerHTML='';
  const title=document.createElement('div');title.className='up-title';title.textContent='ULEPSZENIA: '+p.name;el.appendChild(title);
  const u=getUps(id);
  ['fire','speed','armor','salvo'].forEach((k,i)=>{
    const lv=u[k]||0,labels=['OGIEŃ','SZYBKOŚĆ','PANCERZ','SALWA'];
    const row=document.createElement('div');row.className='uprow';
    const nm=document.createElement('div');nm.className='uprow-name';nm.textContent=labels[i];row.appendChild(nm);
    const bars=document.createElement('div');bars.className='upbars';
    for(let j=0;j<MAX_UP;j++){const b=document.createElement('div');b.className='upbar'+(j<lv?(lv>=MAX_UP?' max':' on'):'');bars.appendChild(b);}
    row.appendChild(bars);
    const cost=lv<MAX_UP?UP_COSTS[lv]:0;
    const btn=document.createElement('button');btn.className='upbtn';
    if(lv>=MAX_UP){btn.textContent='MAX';btn.disabled=true;}
    else{btn.textContent='LV'+(lv+1)+' ('+cost.toLocaleString()+'💰)';btn.disabled=!G.owned.includes(id)||G.coins<cost;}
    btn.addEventListener('click',()=>{
      const msg=document.getElementById('shopMsg');
      const cur=getUps(id),cl=cur[k]||0,cc=UP_COSTS[cl];
      if(G.coins>=cc&&cl<MAX_UP){
        G.coins-=cc;if(!G.ups[id])G.ups[id]={fire:0,speed:0,armor:0,salvo:0};G.ups[id][k]++;
        userSave();updBar();renderShop();msg.style.color='#00ffcc';msg.textContent='✓ '+labels[i]+' → LVL '+(cl+1);
      } else {msg.style.color='#ff4466';msg.textContent='BRAKUJE '+(cc-G.coins).toLocaleString()+' 💰';}
    });
    row.appendChild(btn);el.appendChild(row);
  });
}

function startGame(){
  if(!USER){show('login');return;}
  if(running)return;
  const st=getStats(G.active);
  score=0;lives=st.lives;level=1;frame=0;autoT=0;mouseX=310;
  bullets=[];enemies=[];parts=[];
  running=true;ending=false;
  show(null); // hide all screens so canvas shows
  // actually we just hide all screens
  Object.values(screens).forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('active');});
  updBar();
  const px={x:310,y:430};
  loop(px);
}

function endGame(){
  if(ending)return;
  ending=true;running=false;
  const earned=Math.floor(score/10);
  G.coins+=earned;
  const isNew=score>G.hs;
  if(isNew)G.hs=score;
  userSave();
  document.getElementById('goScore').textContent=score.toLocaleString();
  document.getElementById('goNew').style.display=isNew?'block':'none';
  document.getElementById('goHS').textContent=G.hs.toLocaleString();
  document.getElementById('goEarned').textContent=earned.toLocaleString();
  document.getElementById('goTotal').textContent=G.coins.toLocaleString();
  updBar();renderMenu();
  show('gameover');
}

function shoot(px,st){
  const os={1:[0],2:[-7,7],3:[-12,0,12],4:[-16,-5,5,16],5:[-18,-8,0,8,18],6:[-20,-10,0,10,20,-5]};
  (os[Math.min(6,Math.round(st.shots))]||[0]).forEach(ox=>{
    bullets.push({x:px.x+ox,y:px.y-18,w:Math.max(2,Math.round(st.bw)),vy:-Math.round(st.bs),col:activePlane().bc,enemy:false});
  });
}

function spawnEnemy(){
  const types=['normal','normal','fast','big'];
  const type=level>=3?types[Math.floor(Math.random()*types.length)]:(Math.random()<0.2?'fast':'normal');
  const hw=type==='big'?26:type==='fast'?13:16,hh=type==='big'?14:10;
  const col=type==='fast'?'#ff4466':type==='big'?'#bb44ff':'#ffaa00';
  enemies.push({x:Math.random()*580+20,y:-30,hw,hh,type,col,
    spd:type==='fast'?2.5+level*0.26:type==='big'?0.85+level*0.1:1.3+level*0.17,
    hp:type==='big'?4:1,stimer:type==='big'?90:9999,dx:type==='fast'?(Math.random()-0.5)*2.4:0});
}

function fx(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*3+0.5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*2.5+0.5,col,life:35+Math.random()*20});}
}

function drawEnemy(e){
  ctx.save();ctx.translate(e.x,e.y);ctx.rotate(Math.PI);ctx.fillStyle=e.col;
  if(e.type==='big'){
    ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(8,-4);ctx.lineTo(28,10);ctx.lineTo(18,14);ctx.lineTo(5,9);ctx.lineTo(-5,9);ctx.lineTo(-18,14);ctx.lineTo(-28,10);ctx.lineTo(-8,-4);ctx.closePath();ctx.fill();
  }else if(e.type==='fast'){
    ctx.beginPath();ctx.moveTo(0,-13);ctx.lineTo(4,2);ctx.lineTo(2,9);ctx.lineTo(-2,9);ctx.lineTo(-4,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-4,2);ctx.lineTo(-12,9);ctx.lineTo(-9,9);ctx.lineTo(-2,4);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(4,2);ctx.lineTo(12,9);ctx.lineTo(9,9);ctx.lineTo(2,4);ctx.closePath();ctx.fill();
  }else{
    ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(5,2);ctx.lineTo(3,10);ctx.lineTo(-3,10);ctx.lineTo(-5,2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-5,2);ctx.lineTo(-16,10);ctx.lineTo(-12,10);ctx.lineTo(-3,5);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(5,2);ctx.lineTo(16,10);ctx.lineTo(12,10);ctx.lineTo(3,5);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function loop(px){
  if(!running)return;
  frame++;
  level=Math.min(20,1+Math.floor(score/700));
  const st=getStats(G.active),ap=activePlane();
  px.x+=(mouseX-px.x)*0.12;
  px.x=Math.max(22,Math.min(598,px.x));
  autoT++;
  if(autoT>=Math.max(st.sr-level*0.4,5)){autoT=0;shoot(px,st);}
  if(frame%Math.max(28,72-level*4)===0)spawnEnemy();

  // draw background
  ctx.fillStyle='#00000d';ctx.fillRect(0,0,620,500);
  ctx.save();
  STARS.forEach(s=>{s.y+=s.spd;if(s.y>500){s.y=0;s.x=Math.random()*620;}ctx.globalAlpha=s.a*.6;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  ctx.restore();

  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.y+=b.vy;
    if(b.y<-20||b.y>520){bullets.splice(i,1);continue;}
    ctx.fillStyle=b.col;
    if(b.enemy)ctx.fillRect(b.x-2,b.y-5,4,10);
    else ctx.fillRect(b.x-b.w/2,b.y-6,b.w,12);
  }

  // enemies
  enemies=enemies.filter(e=>e.y<580);
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.y+=e.spd;e.x+=e.dx||0;
    if(e.x<18||e.x>602)e.dx*=-1;
    if(e.type==='big'){e.stimer--;if(e.stimer<=0){bullets.push({x:e.x,y:e.y+18,w:4,vy:4,col:'#ff6688',enemy:true});e.stimer=Math.max(35,88-level*5);}}
    if(Math.abs(px.x-e.x)<14+e.hw&&Math.abs(px.y-e.y)<14+e.hh){
      lives--;fx(px.x,px.y,'#00ffcc',16);enemies.splice(i,1);updBar();
      if(lives<=0&&!ending){endGame();return;}
      continue;
    }
    drawEnemy(e);
  }

  // bullet collisions
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.enemy){
      if(Math.abs(px.x-b.x)<15&&Math.abs(px.y-b.y)<15){lives--;fx(px.x,px.y,'#ff4466',14);bullets.splice(i,1);updBar();if(lives<=0&&!ending){endGame();return;}}
      continue;
    }
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.abs(b.x-e.x)<b.w/2+e.hw&&Math.abs(b.y-e.y)<6+e.hh){
        e.hp--;fx(b.x,b.y,e.col,5);hit=true;
        if(e.hp<=0){score+=e.type==='big'?200:e.type==='fast'?100:60;fx(e.x,e.y,e.col,14);enemies.splice(j,1);updBar();}
        break;
      }
    }
    if(hit)bullets.splice(i,1);
  }

  // particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy*=.93;p.life--;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.globalAlpha=p.life/50;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // player
  if(D[ap.id]){ctx.save();ctx.translate(px.x,px.y);D[ap.id](ctx,ap.col,ap.ec);ctx.restore();}

  requestAnimationFrame(()=>loop(px));
}

// ── INIT ──────────────────────────────────────────────────────────────
renderSB();
show('login');
</script>
